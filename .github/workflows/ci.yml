name: CHAINLOCK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8
      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Test
        run: pytest tests/ -v --tb=short

  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Self-scan project dependencies
        run: |
          python3 << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          from core.dependency_extractor import DependencyExtractor
          from core.vulnerability_checker import VulnerabilityChecker

          ext = DependencyExtractor()
          chk = VulnerabilityChecker()
          with open('requirements.txt') as f:
              content = f.read()
          deps, eco = ext.extract('requirements.txt', content)
          vulns = chk.check_all(deps)
          critical = [v for v in vulns if v.get('severity') == 'CRITICAL']
          print(f'Scanned {len(deps)} deps, found {len(vulns)} vulns, {len(critical)} critical')
          if critical:
              for v in critical:
                  print(f'CRITICAL: {v["package"]} - {v["cve_id"]}')
              sys.exit(1)
          print('No critical vulnerabilities in project dependencies')
          PYEOF
